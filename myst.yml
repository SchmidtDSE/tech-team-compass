version: 1

project:
  title: "DSE Tech Team Compass"
  description: "Where community members new and old align on objectives and practices"
  github: &repo-url "https://github.com/SchmidtDSE/tech-team-compass"
  license: "MIT"
  exclude:
    - "_*"
    - "README.md"
  toc:
    - file: "index.md"
    - file: "practices/index.md"
      children:
        - file: "practices/language-specific/index.md"
          children:
            - file: "practices/language-specific/javascript.md"
            - file: "practices/language-specific/python.md"
            - file: "practices/language-specific/r.md"
        - file: "practices/openness.md"
        - file: "practices/publishing.md"
        - file: "practices/security.md"

site:
  template: "book-theme"
  nav: []
  actions:
    - title: "View source"
      url: *repo-url
  options:
    folders: true
    style: "assets/styles/style.css"
    favicon: "https://dse.berkeley.edu/themes/custom/dse/favicon.ico"
    logo: "https://dse.berkeley.edu/themes/custom/dse/favicon.ico"
    logo_text: "Schmidt DSE Tech Team Compass"
    hide_footer_links: true
